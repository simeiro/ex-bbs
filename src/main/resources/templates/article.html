<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<form th:action="@{/insert-article}" th:object="${articleForm}" method="post">
    投稿者名:<input type="text" th:field="*{name}"><br>
    投稿内容:<input type="text" th:field="*{content}"><br>
    <button>記事投稿</button>
</form>

<div th:each="article : ${application.articles}" th:object="${articleForm}">
    <p>投稿者名： <span th:text="${article.name}"></span></p>
    <p>投稿内容： <span th:text="${article.content}"></span></p>
    <form th:action="@{/delete-article}" method="post">
        <button>記事削除</button>
    </form>
    <div th:each="comment : ${article.commentList}">
        <p>コメント者名： <span th:text="${comment.name}"></span></p>
        <p>コメント内容： <span th:text="${comment.content}"></span></p>
    </div>
    <form th:action="@{/insert-comment}" th:object="${commentForm}" method="post">
        <p>名前：</p>
        <input type="text" th:field="*{name}"><br>
        <p>コメント：</p>
        <textarea th:field="*{content}" cols="30" rows="10"></textarea>
        <button>コメント投稿</button>
    </form>
</div>
</body>
</html>
