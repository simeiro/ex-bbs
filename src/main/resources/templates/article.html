<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<form th:action="@{/insert-article}" th:object="${articleForm}" method="post">
    投稿者名:<input type="text" th:field="*{name}"><br>
    投稿内容:<input type="text" th:field="*{content}"><br>
    <button>記事投稿</button>
</form>

<div th:each="article : ${application.articles}" th:object="${articleForm}">
    <p>投稿者名： <span th:text="${article.name}"></span></p>
    <p>投稿内容： <span th:text="${article.content}"></span></p>
    <form th:action="@{/delete-article}">
        <button>記事削除</button>
    </form>
</div>
</body>
</html>
